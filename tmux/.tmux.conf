# Unbind the default prefix (Ctrl-b)
unbind C-b

# Set the new prefix to the +/= key
set -g prefix ´
bind-key = send-prefix

# General settings
set -g status-position bottom
set -g status-bg colour234
set -g status-fg colour137
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20
setw -g mode-keys vi

# Window numbering starts at 1
set -g base-index 1

# Pane numbering starts at 1
setw -g pane-base-index 1

# Bind leader + c to create a new window
bind c new-window

# Bind leader + v for vertical split, leader + b for horizontal split
bind v split-window -h
bind b split-window -v

# Navigate between panes
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Move panes around
bind -r M-h swap-pane -t '{left-of}'
bind -r M-j swap-pane -t '{down-of}'
bind -r M-k swap-pane -t '{up-of}'
bind -r M-l swap-pane -t '{right-of}'

# Move panes with Shift+HJKL
bind -r H swap-pane -t '{left-of}'
bind -r J swap-pane -t '{down-of}'
bind -r K swap-pane -t '{up-of}'
bind -r L swap-pane -t '{right-of}'

# Search text in the active pane
bind f copy-mode \; command-prompt -p 'search:' "send -X search-forward '%%'"

# Window status formatting
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

# History limit
set-option -g history-limit 5000

# Enable mouse support
set -g mouse on
